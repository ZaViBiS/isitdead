run:
  go: "1.26.2"

linters:
  enable:
    - govet        # підозрілі конструкції
    - errcheck     # незамінені помилки
    - staticcheck  # статичний аналіз
    - gosimple     # спрощення коду
    - ineffassign  # марні присвоєння
    - unused       # невикористаний код
    - goimports    # порядок імпортів
    - misspell     # орфографія в коментарях

linters-settings:
  goimports:
    local-prefixes: github.com/ZaViBiS/isitdead
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck   # у тестах можна ігнорувати деякі помилки
